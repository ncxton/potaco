# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: potaco

before:
  hooks:
    - go mod download

builds:
  - id: potaco
    main: .
    binary: potaco
    ldflags:
      - -X main.version={{.Tag}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}apple-darwin
      {{- else }}{{ .Os }}
      {{- end }}_{{ .Arch }}
    files:
      - install.sh
      - LICENSE
      - README.md

checksum:
  name_template: '{{ .ProjectName }}_{{ .Version }}_checksums.txt'
  algorithm: sha256

changelog:
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: '^feat(\(.*\))?:'
      order: 0
    - title: Bug Fixes
      regexp: '^fix(\(.*\))?:'
      order: 1
    - title: Refactoring
      regexp: '^refactor(\(.*\))?:'
      order: 2
    - title: Performance
      regexp: '^perf(\(.*\))?:'
      order: 3
    - title: Other
      order: 999
  filters:
    exclude:
      - '^docs(\(.*\))?:'
      - '^test(\(.*\))?:'
      - '^chore(\(.*\))?:'
      - '^style(\(.*\))?:'
      - '^ci(\(.*\))?:'
      - '^build(\(.*\))?:'

release:
  github:
    owner: ncxton
    name: potaco
  draft: false
  prerelease: auto
  name_template: '{{ .Tag }}'
  extra_files:
    - glob: ./install.sh
