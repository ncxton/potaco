title = "gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = "Allow test API keys in test files and install script"
paths = [
  '''*_test\.go''',
  '''install\.sh''',
  '''README\.md''',
  '''AGENTS\.md''',
  '''CONTRIBUTING\.md''',
  '''skills/.*\.md''',
]

[[allowlists]]
description = "Allow placeholder API key patterns"
regexes = [
  '''sk-test''',
  '''sk-xxx''',
  '''sk-\.\.\.''',
  '''\[REDACTED\]''',
]
