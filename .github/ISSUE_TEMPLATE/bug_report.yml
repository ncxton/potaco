name: Bug report
description: Report a bug or unexpected behavior
title: "[bug] "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Commands or actions that trigger the bug.
      placeholder: |
        1. Run `potaco ...`
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include error output if any.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Potaco version
      description: Output of `potaco --version`
      placeholder: e.g., 0.1.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - FreeBSD
        - Other
    validations:
      required: true

  - type: dropdown
    id: arch
    attributes:
      label: Architecture
      options:
        - amd64
        - arm64
        - Other
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - OpenAI
        - fal
        - Vercel AI Gateway
        - Other / N/A
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else relevant (config settings, image format, etc.).
    validations:
      required: false
