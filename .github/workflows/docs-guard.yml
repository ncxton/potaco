name: docs-guard

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  block-protected-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Detect changes to protected documentation files
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            const protected = [
              'AGENTS.md',
              'CONTRIBUTING.md',
              'SECURITY.md',
            ];

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const touched = files.filter((f) =>
              protected.includes(f.filename) ||
              protected.includes(f.previous_filename)
            );

            if (touched.length === 0) {
              core.info('No protected documentation files changed.');
              return;
            }

            const changedList = touched
              .map((f) =>
                f.previous_filename && f.previous_filename !== f.filename
                  ? `- ${f.previous_filename} -> ${f.filename}`
                  : `- ${f.filename}`,
              )
              .join('\n');

            const body = [
              'This pull request modifies maintainer-controlled documentation files.',
              '',
              'Detected changes:',
              changedList,
              '',
              'These files are maintained by the project maintainers and cannot be modified in pull requests. Please revert these changes and open a new PR without touching them.',
            ].join('\n');

            try {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              });
            } catch (error) {
              core.warning(`Failed to comment on PR #${prNumber}: ${error.message}`);
            }

            core.setFailed('PR modifies protected documentation files');
