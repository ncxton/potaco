name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Check gofmt
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "::error::files need gofmt"
            gofmt -l .
            exit 1
          fi

      - name: Check installer syntax
        run: sh -n install.sh

      - name: Check release asset contract
        run: |
          grep -F "extra_files:" .goreleaser.yaml
          grep -F "glob: ./install.sh" .goreleaser.yaml
          grep -F "asset_version=" install.sh
          grep -F 'potaco_${asset_version}_${os}_${arch}.tar.gz' install.sh
          if grep -F 'potaco_${os}_${arch}.tar.gz' install.sh; then
            echo "::error::installer still references unversioned release archives"
            exit 1
          fi
          if grep -F "skipping verification" install.sh; then
            echo "::error::installer checksum verification must fail closed"
            exit 1
          fi

      - name: Check go mod tidy
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod; then
            echo "::error::go.mod is not tidy; run 'go mod tidy' and commit"
            git diff go.mod
            exit 1
          fi

      - name: Staticcheck (dead code, complexity, unused)
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: Check cyclomatic complexity
        run: |
          go install github.com/fzipp/gocyclo/cmd/gocyclo@latest
          if ! gocyclo -over 30 .; then
            echo "::error::functions exceed cyclomatic complexity threshold of 30"
            exit 1
          fi

      - name: Test with coverage
        run: |
          go test ./... -v -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | sed 's/%//' | awk '{if ($1 < 50) {print "::warning::Coverage below 50%: " $1 "%"} else {print "Coverage: " $1 "%"}}'

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.out

  cross-compile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Download modules
        run: go mod download

      - name: Cross-compile
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          go build -ldflags="-s -w" -o "dist/potaco-${GOOS}-${GOARCH}" .

      - name: Verify static binary
        if: matrix.goos == 'linux'
        env:
          BINARY: dist/potaco-${{ matrix.goos }}-${{ matrix.goarch }}
        run: |
          if readelf -l "$BINARY" 2>/dev/null | grep -q 'Requesting program interpreter'; then
            echo "::error::binary is dynamically linked; expected fully static (CGO_ENABLED=0)"
            readelf -l "$BINARY" >&2
            exit 1
          fi
          echo "Confirmed: binary is statically linked"
