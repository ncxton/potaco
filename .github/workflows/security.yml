name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: true

  docs-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Validate AGENTS.md build commands
        run: |
          # Verify commands documented in AGENTS.md actually work
          go build -o potaco .
          go vet ./...
          if [ -n "$(gofmt -l .)" ]; then
            echo "::error::gofmt check failed"
            gofmt -l .
            exit 1
          fi
          echo "AGENTS.md build/vet/gofmt commands validated successfully"

      - name: Validate AGENTS.md file tree
        run: |
          # Extract file paths from the AGENTS.md code fence and verify they exist.
          # Tracks indentation to reconstruct full paths from the tree hierarchy.
          python3 << 'PYEOF'
          import re, os, sys
          with open('AGENTS.md') as f:
              content = f.read()
          m = re.search(r'## Project Structure.*?```(.*?)```', content, re.DOTALL)
          if not m:
              print('::error::No file tree code block found in AGENTS.md')
              sys.exit(1)
          missing = []
          stack = []  # (indent, dirpath) pairs
          for line in m.group(1).splitlines():
              if not line.strip() or line.strip().startswith('#'):
                  continue
              indent = len(line) - len(line.lstrip())
              stripped = line.strip()
              while stack and stack[-1][0] >= indent:
                  stack.pop()
              name_part = stripped.split('  ')[0].strip()
              for name in name_part.split(','):
                  name = name.strip()
                  if not name:
                      continue
                  is_dir = name.endswith('/')
                  clean = name.rstrip('/')
                  parent = stack[-1][1] if stack else ''
                  if is_dir:
                      full = os.path.join(parent, clean) if parent else clean
                      stack.append((indent, full))
                      continue
                  if '.' not in clean and '/' not in clean:
                      continue
                  full = os.path.join(parent, clean) if parent else clean
                  if not os.path.exists(full):
                      missing.append(full)
          if missing:
              for p in missing:
                  print(f'::error::File referenced in AGENTS.md not found: {p}')
              sys.exit(1)
          print('AGENTS.md file tree validated successfully')
          PYEOF
