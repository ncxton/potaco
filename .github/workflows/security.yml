name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: true

  docs-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Validate AGENTS.md build commands
        run: |
          # Verify commands documented in AGENTS.md actually work
          go build -o potaco .
          go vet ./...
          if [ -n "$(gofmt -l .)" ]; then
            echo "::error::gofmt check failed"
            gofmt -l .
            exit 1
          fi
          echo "AGENTS.md build/vet/gofmt commands validated successfully"
